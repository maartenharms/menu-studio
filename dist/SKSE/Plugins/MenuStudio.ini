[General]
; Master switch for the whole bubble.
bEnabled=1

; The bubble needs its menus PAUSED. Skyrim Souls unpauses menus, which used
; to mean hand-editing SkyrimSoulsRE.ini (bContainerMenu=false and friends).
; Leave this ON and Menu Studio re-pauses ITS OWN menus (sMenus below)
; at open time through the engine's own pause bookkeeping - no Skyrim Souls
; INI edits needed, and every other menu keeps your Skyrim Souls behavior.
; Without Skyrim Souls this never does anything (menus already pause).
; Turn OFF only if you want bubble menus unpaused again - the studio then
; keeps just the lighting and the colour filter in them.
;
; LEFT UNSET ON PURPOSE: an explicit value here always wins, and Menu Studio
; detects Skyrim Souls by itself and fills in the right default (ON when Souls
; is present). Pinning =1 here defeated that detection for every install.
; Uncomment only to force a choice:
;bForcePause=1

; Tick the player's behavior graph each frame while a bubble menu is
; open and the game is paused.
bTickAnimation=1

; FREEZE THE CHARACTER (off by default): hold the exact frame the menu
; caught. No animation, no settling to idle, no blinking - a still.
; Hair and cloth, body physics and your weapon preview all keep working,
; so the pose still reacts when you spin your character and still shows
; what you equip; only your character's own animation stops.
; Overrides bTickAnimation, bTickFace and bIdleInMenus while it is on.
bFreezeCharacter=0

; Menu Studio holds the caught frame when a pose cannot settle by itself.
; Untick either of these for a living pose more often, and the odd stutter or
; step in exchange. See docs/KNOWN-LIMITATIONS.md for why they exist.
; Moving or turning and not coming to a stop on their own:
bFreezeUnsettledPose=1
; Caught part way through drawing or putting away a weapon:
bFreezeDrawSheathe=1

; Stop the weapon-preview animation pump the moment the draw or sheathe it
; is driving reaches an idle, instead of running a fixed budget past it.
; Off while it is still being measured in the field.
bPumpStopsAtIdle=0

; Clear Smooth Moveset's "idle starting" marker while a menu is open so the
; stance framework can pick its looping idle instead of a stepping one.
; Harmless without Smooth Moveset installed.
bClearIdleStartMarker=1

; Apply Smooth Moveset's "settled" marker when it is missing. Off: that marker
; is read by hundreds of stance configs, not just the idle ones.
bApplySettledMarker=0

; Let a menu opened mid-draw WHILE MOVING skip the draw/sheathe hold. Off: it
; lets a mid-transition graph keep ticking, which shows as walking in the menu.
bMovingArmStandsAside=0

; Drive FSMP (fingerprint-checked builds only) with the same dt so
; hair/cloth simulate while paused.
bDriveSmp=1

; Keep the player's FACE alive too: blink timers and MFG expression /
; phoneme / modifier ramps (Conditional Expressions etc. set targets; this
; keeps the ramps moving while paused).
bTickFace=1

; Your FACE while the menu is up (needs bTickFace=1). Expression mods
; (Conditional Expressions and friends) run on Papyrus, which any paused
; menu freezes - without help, opening mid-blink or mid-expression would
; hold that face the whole time.
; 1 = KEEP EXPRESSION (default): your expression mod's mood stays on the
;     face while the menu is up. Anything the pause caught mid-motion is
;     gently finished instead of sticking: a half-blink releases, a mouth
;     frozen mid-shape settles closed, off-center eyes come back to level,
;     and natural blinking continues. Your mods take over again the moment
;     the menu closes.
; 2 = NEUTRAL: the caught expression is saved, the face gently dissolves
;     to neutral for a standardized studio look, and your expression comes
;     back as it was when the menu closes (eyes open - a half-finished
;     blink is never restored).
; 0 = OFF: no expression handling. With bTickFace=1 the face still
;     animates (ramps finish, natural blinking continues), but a blink the
;     pause caught halfway is never released; bTickFace=0 freezes the face
;     exactly as caught.
; (bNeutralExpression from older versions migrates to the new default;
; set iFaceInMenus=2 if you want the old dissolve-to-neutral look back.)
iFaceInMenus=1

; CBPC body physics while the bubble is armed (breast/butt/belly bounce).
; Uses CBPC's own paused-RaceMenu simulation path; recognized CBPC build only.
bDriveCbpc=1

; Keep equipped-spell hand art alive: switching spells in the Magic menu
; shows the new spell in your hands right away (when your hands are drawn;
; sheathed hands show nothing, exactly like unpaused play).
bTickMagicCasters=1

; Settle to idle: opening a menu mid-walk normally leaves the walk cycle
; looping in place (the movement controller is paused, so the graph keeps
; playing its last state). On menu open your character gets the same
; "input stopped" signal releasing the keys produces (grounded movement
; only - jumps and swimming are never touched) and blends to a natural
; idle; real movement resumes the moment the menu closes.
bIdleInMenus=1
; Graph flags that freeze the pose at menu open, the way attacks freeze -
; dodge mods (TK Dodge, TUDM, DMCO...) read as ordinary walking otherwise
; and their animation would play out inside the menu. If your dodge mod
; uses a different variable name, add it here (comma-separated, no
; rebuild needed).
sFreezeGraphBools=bIsDodging, DMCO_IsDodging, bDMCO_IsDodging

; Show your weapon in hand (default ON): with a weapon equipped, your
; character draws it while a menu is open, so you can actually see how it
; looks in their hands, and puts it away again when you close the menu.
; They stand the way that weapon is held, so a greatsword and a bow read
; differently - the game picks the stance, exactly as it does in play.
; Swapping weapons inside the menu swaps what they are holding. This
; follows the right hand, so a weapon carried only in the left will not
; show (dual-wielding is fine - drawing brings out both hands). If your
; weapon was already drawn, it simply stays drawn and nothing is put away
; on close. Skipped in combat and on horseback.
bWeaponPreviewInMenus=1

; Keep the head still while a bubble menu is open: without this, head
; tracking (e.g. True Directional Movement's) keeps re-aiming your face
; at a world direction while you rotate the preview. The head follows
; the body again; normal head tracking resumes on close.
bFreezeHeadTracking=1

; PREVIEW SPIN (default ON): spin the CHARACTER with right-mouse drag
; or the right stick while a bubble menu is open. Camera-rotation mods
; (Show Player In Inventory's SmoothCam mode etc.) orbit the CAMERA -
; nothing on the character moves, so hair/cloth physics correctly stays
; still. This spins the BODY: the skeleton really rotates, so hair
; swings with real momentum. Works while any animation plays; your
; character stands exactly as they did when the menu closes. Coexists
; with camera rotation (different input).
bPreviewSpin=1
; Show Player In Menus users only: SPIM rotates on right-mouse held as well,
; which is the same drag this spin uses - so one drag used to drive both at
; once and the character span at roughly double speed. With this ON, SPIM's
; rotation is neutralised while a bubble menu is open and the spin above is
; the only thing that turns your character (SPIM keeps framing the shot; only
; its rotation steps aside, and it comes straight back when the menu closes or
; if you set bPreviewSpin=0). Set 0 to let both run like before. Does nothing
; without Show Player In Menus installed.
bOverrideSpimRotation=1
; Radians per mouse count while right-dragging (0.0005 - 0.05).
fSpinSensitivity=0.005
; Controller: move the RIGHT STICK to rotate - directly, no hold button
; (while an item's 3D preview is zoomed, the stick rotates the ITEM
; instead, exactly like Show Player In Menus handles it).
; iSpinGamepadButton is retired (parsed, unused).
iSpinGamepadButton=274
; Radians per second at full stick deflection (0.5 - 10).
fSpinStickSensitivity=3.0

; First-person menus: without this, opening barter (or any bubble menu)
; from first person can leave you staring at nothing - some player-view
; mods miss that path. The bubble switches to a third-person preview
; facing your character and puts first person back when the menu closes.
; Does nothing when the camera is already third person.
bOwnViewFirstPerson=1
; Own the framing on THIRD-person arms too when no installed view mod
; covers that menu (e.g. barter/container with only Show Player In
; Inventory present) - the full SPIM-style over-shoulder framing:
; character beside the UI panels, fixed camera distance, 90 FOV,
; everything restored on close. With no view mod installed at all, the
; bubble frames every menu itself.
bOwnViewUnmanaged=1
; Framing offsets (SPIM's PositionSettings semantics; defaults = the
; Nolvus preset). If Show Player In Menus' own MCM files exist, those
; win automatically so the two never drift apart.
;   X: sideways shift (over-shoulder X = -X - 75)
;   Y: camera distance (boom = 155 - Y)   Z: height (offset = Z - 50)
;   Pitch: player pitch = 0.2 + value     Rotation: yaw trim
fOwnViewXOffset=-20
fOwnViewYOffset=50
fOwnViewZOffset=0
fOwnViewPitch=0
fOwnViewRotation=0
; Mounted framing: a rider sits high on the horse, so these are added ON TOP
; of the offsets above only while you're on a mount, to frame the rider like
; the standing view instead of a tiny figure above a big horse.
;   Raise: look-at height (rider torso). Boom: extra camera distance - LOWER
;   = bigger rider (0 = same distance as standing). Pitch: extra downward tilt.
fOwnViewMountRaise=120
fOwnViewMountBoom=50
fOwnViewMountPitch=0

; Sleek transitions: the stage and the rig lights dissolve out when the
; menu closes (fade-out timing in seconds; 0 = instant). The OPENING
; fade-in and the black dip are DISABLED in this build (the keys below
; are ignored) while they get reworked - the studio appears instantly.
bSleekTransitions=1
fTransitionIn=0.0
fTransitionOut=0.15

; TEMPORARILY DISABLED (this build ignores these keys): the black
; fade in/out ran on the engine's fader menu, which is suspected of
; capturing menu input (r26: Magic menu unresponsive). Parked until
; the fade rework.
bDipToBlack=0
fDipOutSeconds=0.0
fDipInSeconds=0.35

; EXIT: an INSTANT CUT. Hold 0 (default) tears the whole studio down AT
; the menu close - nothing of the void survives into a single post-menu
; frame. The cost: switching menus (inventory <-> magic) flashes the world
; for a few frames. Raise the hold to ~0.085 to keep switches seamless
; (the studio then stays up that long after a real exit instead).
bSleekExit=1
fExitHoldSeconds=0
; Retired (the fade-to-black exit was removed in r47 - its black never
; reliably covered under ENB): parsed for compatibility, used by nothing.
fExitDipSeconds=0.12
fExitInSeconds=0.20

; While the bubble is active, eat RIGHT-mouse clicks in these menus so
; right-drag rotation never triggers the UI's quick buy/sell/equip
; (Vel'dun UI / Kome's Inventory Tweaks bind right-click; vanilla doesn't).
bBlockRightMouse=1

; Skip the third-person camera's obstruction pull-in while the bubble is
; active. In the void (mode 2) the room is hidden anyway and free orbit is
; the point. In scene view (mode 1) the walls are VISIBLE, so the camera
; will glide through them - set 0 there if that bothers you.
; Gameplay camera collision is untouched either way.
bBypassCameraCollision=1

; Menus that form the bubble (comma-separated Scaleform menu names).
; (RaceSexMenu support was trialed and is PARKED - field r18: the bubble
; doesn't arm there; revisit post-release if wanted.)
sMenus=ContainerMenu,BarterMenu,InventoryMenu,MagicMenu

; Which of those menus get the SPACE around you (the void / dressing room from
; [Declutter] below). The rest still pause, still keep your character alive and
; posed with physics - they just open over the normal world. Handy if you want
; the backdrop for your OWN character menus but not while looting a follower or
; trading with a merchant:
;   sSpaceMenus=InventoryMenu,MagicMenu
; Default is all four (what the mod has always done). Also editable per menu in
; the settings panel.
sSpaceMenus=ContainerMenu,BarterMenu,InventoryMenu,MagicMenu

; Clamp for the per-frame delta (seconds). Protects against hitches feeding a
; giant step into the graph/physics.
fMaxDeltaTime=0.05

; Once-per-second telemetry lines while armed (debug-level, log file only).
; Kept ON in the field-test install; the release default is OFF.
bVerboseLog=1

[Declutter]
; The space around you while the bubble is armed. Everything restores the
; moment the menu closes, and switching applies LIVE mid-menu (panel).
; 0 = OFF: menus open over the world exactly as you left it
; 1 = SCENE VIEW: the room stays visible with its own lighting; NPCs and
;     furniture are cleared out (the chair you sit on stays)
; 2 = VOID: everything around you hides into a colored void - studio
;     lighting and the three-point rig, NO stage
; 3 = DRESSING ROOM: the stage builds around you in the void - floor,
;     dome and set pieces (see [Backdrop]), studio lighting, the rig and
;     the vibe coloring it all
; (light sources stay in 2+3 so your lighting doesn't change; the chair
; you sit on stays in every mode)
; A colour FILTER can be layered on ANY of these views - see [Filter].
iDeclutterMode=2
; Modes 1+2: how far around you to clear (units; 4096 ~ 58 m).
fSoloHideRadius=4096
; Mode 2: also hide light refs' art (fires, candle flames, smoke, sparks).
; Their ILLUMINATION normally survives (the light itself isn't the mesh);
; set 0 if your setup disagrees and the character goes dark.
bHideLightRefs=1
; Void + dressing room: cut the CELL'S OWN light sources (the illumination
; itself, not just the art) so the character is lit purely by the studio
; rig and the studio light - no more brazier/candle glow from a room you
; can't even see. Your equipped torch/candlelight keeps working. Restores
; on close. Set 0 to let the cell keep lighting the character.
bCutCellLights=1
; Void + dressing room: THE VOID ENGINE - hide the world's own feeders at
; their engine roots: all grass (the engine's ToggleGrass switch), the
; terrain under and around you, distant-LOD land/water, and any rain/snow
; caught mid-air by the pause. Also disarms image-space blur (e.g. a magic
; projectile's) frozen over the studio. Everything restores on close.
; This is what makes the void identical outdoors, indoors, any weather.
bVoidEngine=1
; Studio lighting while armed (interiors only; the void and the dressing
; room, since Off and Scene view keep the cell's own look by default).
; Colors come from [Lighting] below. Original cell lighting restores on
; menu close.
bStandardizeLighting=1
; Standardize the lighting OUTSIDE the void too (view modes 0 Off and 1
; Scene view). Unlike the rig, this rewrites the ROOM: its ambient, its fog
; and its image space all take the studio look, so with the world still on
; screen you restyle the whole place rather than just your character. Try
; bRigWithoutSpace first if you only want your character lit. Exteriors
; have no interior lighting data to rewrite, so out there the rig is the
; only piece that applies. Off by default.
bStudioLightWithoutSpace=0

[Backdrop]
; The BACKGROUND and the STAGE are independent - mix and match. Both are
; borrowed from the game's own meshes at runtime: render-side clones
; only, no plugin, no placed references, nothing touches your save;
; everything vanishes when the menu closes. Both switch LIVE (panel).
;
; BACKGROUND - the dome around you in the Void AND the Dressing room. Each
; sits in front of the opaque void shell, which blocks the sky behind it, so
; you can pick any of the game's constellation domes (switch live in the SKSE
; panel; size/height sliders retune each). A dome your load order lacks just
; falls back to the plain void.
;   blank         = a flat void COLOUR (set it with "Custom void color" below,
;                   or it follows the time-of-day vibe); no dome
;   constellation = the skills-menu star dome (default)
;   vampire       = Dawnguard's vampire perk constellation (needs Dawnguard)
;   aurora        = the third vanilla perk dome
;   custom        = YOUR OWN picture wrapped on the void sphere. Ships an
;                   example nebula; replace textures\mtb\voidshell_g.dds with
;                   any 2:1 (equirectangular) image to use your own - it shows
;                   as-is (not tinted). Turn on "Lock background angle" to keep
;                   it framed the same way every time.
sBackground=constellation
; STAGE - the floor (+ set pieces) under you in the Dressing room:
;   starlight = the round Nightingale ceremony dais
sStage=starlight
; BACKDROP PACKS: drop packs under Data\SKSE\Plugins\MenuStudio\Backdrops\ to add
; your own backgrounds and stages to the lists above. The mod ships an example
; (Backdrops\Example.ini); see the "Make your own backdrop" section of the readme.
; Per-key overrides ON TOP of the chosen background/stage - uncomment to
; pin one (the panel writes these automatically when you hand-tune
; sizes/heights). Mesh paths are under Data\meshes\ (BSA or loose
; files); clear one to drop that piece; sizes rescale whatever loads
; (bound radius in units, ~64 = 1 m); heights are relative to your feet.
;sFloorMesh=clutter\nightingale\nightingaleplatform.nif
;sDomeMesh=interface\intperkskydome.nif
; The SHELL: an enclosing surface just outside the star dome - the
; void's skin. The star dome is see-through where dark (additive
; shader), so without the shell, ENB mist and stray FX behind it become
; the background (the "white void"). Default: the mod's OWN mesh
; (meshes\mtb\voidshell.nif) - a texturally flat, unlit sphere, so the
; void is ONE solid color in every cell (the vanilla domes had seams,
; shifted color per location, and their star textures read as the
; constellation even with sBackground=blank; old values migrate
; automatically). Clear the value to disable the shell.
;sShellMesh=mtb\voidshell.nif
; The star layer over the constellation - the vanilla skills menu draws
; its stars with this separate mesh next to the nebula dome. Clear the
; value to turn the stars off.
;sStarsMesh=interface\intperkstars01.nif
;fFloorRadius=600
;fDomeRadius=2200
;fFloorZ=-10
;fDomeZ=0
; Emissive glow strength on the backdrop (0 = scene light only, up to 4).
; The glow COLOR follows the vibe (preset / time & season) live.
fBrightness=1.0
; Hard luminance ceiling on the void's color (dome + shell): the vibe and
; time of day vary the void's HUE, never its brightness - it stays dark in
; every look and every cell (0.02 pitch black .. 0.35 washed; 0.10 default).
fVoidBrightnessCap=0.10
; LOCK BACKGROUND ANGLE (for custom images): the background is normally fixed
; to the WORLD, so which part of it sits behind your character depends on
; which way you were facing when you opened the menu (nice and varied for the
; star domes). Turn this ON and the sphere instead turns to FACE THE CAMERA,
; so a hand-made picture assigned to the void shell always frames the same
; way - and it follows if you orbit the camera. Off = the world-fixed look.
bLockBackgroundAngle=0
; Spin the background in place (-180..180 degrees) to compose where a custom
; image's focal point sits behind the character. Only used when the lock is ON.
fBackgroundYaw=0

[Lighting]
; The studio look used in the dressing room (background, stage and rig).
; A preset is a complete VIBE: background (ambient/fog/void color) AND the
; three-point rig (key/fill/rim colors + intensities) change together:
;   studio = neutral daylight, balanced rig (tuned on a full stack)
;   bright = strong clean neutrals, hot rig - for murky/light-poor cells
;   warm   = candlelit amber: amber key, dim warm fill (harder shadows)
;   cool   = moonlit blue: pale key, deep-blue fill, strong icy rim
;   dusk   = sunset: orange key, violet fill, hot warm rim
; In-game: SKSE Menu Framework panel (if installed) edits all of this live.
sPreset=studio
; MATCH TIME & SEASON (default OFF): ignore sPreset and pick the whole look
; from the game clock - day=studio, dawn/sunset=dusk, evening=warm,
; night=cool - tinted by the calendar season (summer +bright, autumn
; +warm, winter +cool). The dressing room follows Skyrim's time; colors
; update live while a menu is open. NOTE: while this is ON, the mood
; preset and every rig control below are driven by the clock (the panel
; greys them out); manual preset + color controls apply only while OFF.
bMatchTimeAndSeason=0
; Per-channel overrides (R,G,B 0-255) applied ON TOP of the preset.
; Uncomment to customize; rFog is also the VOID color you float in.
;rAmbient=96,96,100
;rDirectional=160,155,150
;rFog=13,13,15
;rFill=80,80,84
; Pick the voidsphere's color directly (panel has a color picker). When
; enabled, this exact color paints the shell - no vibe hue, no brightness
; cap. Off = the void follows the vibe/preset flow as usual.
bVoidColorOverride=0
rVoidColor=13,13,15
; Fog band (units). Pull fFogNear in for a tighter, moodier void.
fFogNear=3000
fFogFar=6000
; Studio rig: classic three-point lighting (warm KEY front-left, cool
; FILL front-right, white RIM behind) placed around you while the void is
; up - real modeling light on the character even in cells that have no
; placed lights at all. Render-side only: no light forms, no placed
; references, nothing touches your save. All rig values apply LIVE -
; change them in the SKSE menu panel while the menu is open and watch.
bStudioRig=1
; Use the rig OUTSIDE the void too (view modes 0 Off and 1 Scene view), so
; the world stays exactly as it is behind you and only your character picks
; up the three studio lights. These are real point lights, so anything
; standing close by catches them as well; fRigBrightness dials that back.
; Off by default, so nothing changes on an existing install.
bRigWithoutSpace=0
; Scales all three rig lights at once (0.0 - 4; 0 = rig off). Default 0.2 -
; a soft rig; raise for punchier modelling light.
fRigBrightness=0.2
; Per-light control: enable / color (R,G,B) / intensity (0 - 4).
; Colors and intensities FOLLOW THE PRESET above (each preset is a full
; vibe: background + all three rig lights). Uncomment a key only to pin
; that channel across presets; the panel writes these automatically when
; you hand-tune a light.
bRigKey=1
;rRigKeyColor=255,242,222
;fRigKeyIntensity=1.0
bRigFill=1
;rRigFillColor=184,199,230
;fRigFillIntensity=1.0
bRigRim=1
;rRigRimColor=255,255,255
;fRigRimIntensity=1.0

[Filter]
; An optional colour grade over the WHOLE menu scene, in ANY view - a photo-style
; colour filter. OFF by default. It is a uniform screen wash, so it tints
; everything in frame, your CHARACTER included (a true world-not-character filter
; needs a stencil/compositor pass the plugin can't do - a nice-to-have deferred
; for later). All keys apply LIVE from the panel.
bColorFilter=0
; Filter colour (R,G,B 0-255). Default a warm sepia parchment.
rTintColor=200,170,120
; Strength: how strongly the colour washes the scene (0-1; lower = greyer).
fTintStrength=0.5
; Saturation (0-1; lower = more faded/desaturated).
fSaturation=0.6
; Brightness of the filtered scene (0-1.5; 1.0 = unchanged, below 1 dims).
fBrightness=0.9

[Compatibility]
; WHICH SKYRIM VERSIONS MENU STUDIO WILL LOAD ON. You should not need to touch
; this. Menu Studio runs on Skyrim SE 1.5.97 and on every Anniversary Edition
; from 1.6.317 up, and it checks its own engine addresses against YOUR build at
; startup - if that check fails it declines to load rather than load and
; misbehave. The result of the check is written to MenuStudio.log.
;
; 0 = normal. Load on 1.5.97 and 1.6.317+, and let the startup check decide.
; 1 = load anyway, even if the startup check fails. For testing only: the
;     pause features will most likely do nothing. If the author asked you to
;     set this, send them MenuStudio.log afterwards.
; 2 = strict. Only 1.5.97 and 1.6.1130+, the two builds Menu Studio was
;     originally verified against. Set this if a newer version misbehaves on
;     your build and you want the old refusal back.
iRuntimeGate=0
