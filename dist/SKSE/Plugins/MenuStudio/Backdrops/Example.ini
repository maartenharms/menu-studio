; Menu Studio backdrop pack. Drop an INI like this (plus its meshes) under
;   Data\SKSE\Plugins\MenuStudio\Backdrops\
; and the pack shows up in the Background and Stage lists in the menu. Copy this
; file, rename it, and edit the values to make your own.

[Pack]
name   = Example Nebula
author = Menu Studio

; A background is a dome mesh: any .nif, cloned and scaled to radius, sitting
; behind you in the Void and the Dressing room. This example reuses the mod's
; own nebula sphere. To show your own picture, copy meshes\mtb\voidimage.nif,
; point its texture at your own 2:1 (equirectangular) image in NifSkope, ship
; that .nif with your pack, and set dome= to it. (A bare image= option is
; planned for a later update.)
[Background]
dome   = mtb\voidimage.nif
radius = 2000
z      = 0
; faceCamera locks the dome to the camera so it frames the same way no matter
; which direction you faced when the menu opened.
faceCamera = 1
yaw    = 0

; A stage is the floor (and optional props) you stand on in the Dressing room.
; Uncomment this section and point floor= at any mesh under Data\meshes\ to add
; your own. Leave it out for a background-only pack.
;[Stage]
;floor  = clutter\nightingale\nightingaleplatform.nif
;radius = 600
;z      = -10

; Optional props on the stage: [Piece1], [Piece2], and so on. Each takes a mesh
; path, an x/y/z offset, a yaw, and either fit (scale the mesh to this bound
; radius, in units) or scale (a plain multiplier). tint=1 follows the scene
; tint; tint=0 keeps the mesh's own look.
;[Piece1]
;mesh  = mymod\myprop.nif
;x = 0
;y = 380
;z = 40
;fit = 60
;scale = 1.0
;yaw = 0
;tint = 0
